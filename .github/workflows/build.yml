name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: stable

      - run: flutter pub get
      - run: flutter build apk --release --target-platform=android-arm64
      - run: flutter build appbundle --release
