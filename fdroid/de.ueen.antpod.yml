AutoName: AntPod
Description: |-
    The anthill for your podcasts — every episode carried home to the hill
    tirelessly. A nimble scout hatched from the spirit of the grand old AntennaPod.

    Browse and subscribe to any podcast. Discover search pulls from both the Apple
    Podcasts catalogue and PodcastIndex — results include podcasts and individual
    episodes side by side. Your feed spans all subscriptions and can be filtered by
    podcast, downloaded, or played status. Audio keeps playing in the background with
    lock screen and notification controls. Save episodes for offline listening, browse
    Apple Charts and personalised recommendations, and enjoy full Material You
    theming on Android 12+.

    No ads. No tracking. No accounts. Just podcasts.

