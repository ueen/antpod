<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AntPod</title>
  <meta name="description" id="meta-desc" content="Open this podcast or episode in AntPod." />
  <meta property="og:title" content="Open in AntPod" />
  <meta property="og:description" content="Open this podcast or episode in AntPod." />
  <meta property="og:image" content="https://antpod.eu/og-image.png" />
  <meta property="og:url" content="https://antpod.eu/open" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://antpod.eu/og-image.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #FFFAF5; color: #1A0E07; font-family: system-ui, -apple-system, sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }

    nav {
      border-bottom: 1px solid #F0E4D4;
      background: #FFFAF5;
      padding: 0.875rem 1.25rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    nav img { border-radius: 50%; }
    .nav-brand { font-weight: 800; font-size: 1.05rem; letter-spacing: -0.02em; color: #1A0E07; text-decoration: none; }

    main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1.25rem 3rem; }

    .card {
      width: 100%; max-width: 420px;
      background: #fff;
      border: 1px solid #F0E4D4;
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
      overflow: hidden;
    }

    .cover-wrap { position: relative; background: #F0E4D4; }
    .cover-wrap img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.35s ease;
    }
    .cover-placeholder {
      width: 100%; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #FFF3E6 0%, #F0E4D4 100%);
    }
    .cover-placeholder svg { opacity: 0.35; }

    .body { padding: 1.25rem; }

    .badge {
      display: none;
      align-items: center; gap: 0.3rem;
      background: rgba(255,154,48,.12); color: #C06A00;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 0.6rem;
      width: fit-content;
    }
    .podcast-name {
      font-size: 0.85rem; color: #9E7056; font-weight: 500;
      margin-bottom: 0.35rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ep-title {
      font-size: 1.15rem; font-weight: 800; line-height: 1.3;
      letter-spacing: -0.02em; margin-bottom: 1.25rem;
    }

    /* Custom audio player */
    .player {
      display: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      background: #FFFAF5; border: 1px solid #F0E4D4;
      border-radius: 0.75rem; padding: 0.75rem 1rem;
      margin-bottom: 1.125rem;
    }
    .cp {
      display: flex; align-items: center; gap: 0.875rem;
    }
    .cp-btn {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #FF9A30;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(255,154,48,.35);
      transition: background 0.15s, transform 0.1s;
    }
    .cp-btn:hover { background: #E07E18; transform: scale(1.05); }
    .cp-btn:active { transform: scale(0.97); }
    .cp-btn svg { display: block; }
    .cp-right {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .cp-track {
      position: relative;
      height: 20px;
      cursor: pointer;
    }
    .cp-track::before {
      content: '';
      position: absolute; left: 0; right: 0;
      height: 4px; border-radius: 2px;
      background: #F0E4D4;
      top: 50%; transform: translateY(-50%);
    }
    .cp-fill {
      position: absolute; left: 0;
      height: 4px; border-radius: 2px;
      background: #FF9A30;
      width: 0%; transition: width 0.25s linear;
      top: 50%; transform: translateY(-50%);
      pointer-events: none;
    }
    .cp-thumb {
      position: absolute;
      width: 13px; height: 13px;
      background: #FF9A30; border-radius: 50%;
      transform: translate(-50%, -50%);
      left: 0%; top: 50%;
      box-shadow: 0 1px 4px rgba(255,154,48,.5);
      pointer-events: none;
    }
    .cp-times {
      display: flex; justify-content: space-between;
      font-size: 0.7rem; color: #9E7056; font-variant-numeric: tabular-nums;
    }

    /* Buttons */
    .btn-open {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%;
      background: #FF9A30; color: #fff;
      padding: 0.875rem; border-radius: 0.75rem;
      font-weight: 700; font-size: 1rem;
      box-shadow: 0 2px 10px rgba(255,154,48,.35);
      border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 0.625rem;
    }
    .btn-open:hover { background: #E07E18; transform: translateY(-1px); }
    .btn-open:active { transform: translateY(0); }

    .btn-other {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%;
      background: #fff; color: #5C3A1E;
      padding: 0.75rem; border-radius: 0.75rem;
      font-weight: 600; font-size: 0.9rem;
      border: 1.5px solid #F0E4D4;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .btn-other:hover { border-color: #FF9A30; }

    .not-installed {
      display: none;
      background: #FFF3E6; border: 1px solid #FFD4A0;
      border-radius: 0.625rem; padding: 0.75rem 0.875rem;
      font-size: 0.82rem; color: #7B3F00; line-height: 1.55;
      margin-bottom: 0.75rem;
    }
    .not-installed a { color: #FF9A30; font-weight: 600; text-decoration: none; }

    .divider { border: none; border-top: 1px solid #F0E4D4; margin: 0.75rem 0; }

    .feed-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin-top: 0.875rem;
      padding-top: 0.875rem;
      border-top: 1px solid #F0E4D4;
    }
    .feed-label { font-size: 0.72rem; font-weight: 600; color: #9E7056; white-space: nowrap; }
    .feed-url {
      font-size: 0.72rem; color: #9E7056;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }
    .feed-url a { color: #9E7056; text-decoration: none; }
    .feed-url a:hover { color: #FF9A30; }

    footer {
      border-top: 1px solid #F0E4D4;
      padding: 1.125rem; text-align: center;
      font-size: 0.78rem; color: #9E7056;
    }
    footer a { color: #FF9A30; text-decoration: none; font-weight: 600; }
    footer a.muted { color: #9E7056; font-weight: 400; }
  </style>
</head>
<body>

  <nav>
    <a href="/"><img src="https://raw.githubusercontent.com/ueen/antpod/master/antpodlogo.svg"
        width="26" height="26" alt="" /></a>
    <a href="/" class="nav-brand">AntPod</a>
  </nav>

  <main>
    <div class="card">

      <!-- Cover -->
      <div class="cover-wrap">
        <div class="cover-placeholder" id="cover-placeholder">
          <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#FF9A30" stroke-width="1.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="10" r="3"/>
            <path d="M6.17 18a6 6 0 0 1 11.66 0"/>
          </svg>
        </div>
        <img id="cover-img" src="" alt="" />
      </div>

      <div class="body">
        <div class="badge" id="badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span id="badge-label"></span>
        </div>
        <div class="podcast-name" id="podcast-name"></div>
        <h1 class="ep-title" id="ep-title"></h1>

        <!-- Custom audio player (episode only) -->
        <div class="player" id="player">
          <audio id="audio-el" preload="metadata"></audio>
          <div class="cp">
            <button class="cp-btn" id="play-btn" onclick="togglePlay()" aria-label="Play">
              <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="6 3 20 12 6 21 6 3"/></svg>
              <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="white" style="display:none;"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            </button>
            <div class="cp-right">
              <div class="cp-track" id="cp-track">
                <div class="cp-fill" id="cp-fill"></div>
                <div class="cp-thumb" id="cp-thumb"></div>
              </div>
              <div class="cp-times">
                <span id="cp-cur">0:00</span>
                <span id="cp-dur">0:00</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Not installed hint -->
        <div class="not-installed" id="not-installed">
          <span id="not-installed-msg"></span>
          <a id="not-installed-link" href="https://github.com/ueen/antpod/releases"></a>
          <span id="not-installed-suffix"></span>
        </div>

        <!-- Open in AntPod -->
        <button class="btn-open" id="btn-open" onclick="openInApp()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
          </svg>
          <span id="btn-open-label"></span>
        </button>

        <hr class="divider" />

        <!-- Other apps via pod.link -->
        <a class="btn-other" id="btn-podlink" href="https://pod.link/" target="_blank" rel="noopener">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <span id="btn-other-label"></span>
        </a>

        <!-- Feed URL -->
        <div class="feed-row" id="feed-row" style="display:none;">
          <span class="feed-label">RSS</span>
          <span class="feed-url" id="feed-url-text"></span>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <a href="/">AntPod</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/ueen/antpod" class="muted" id="footer-oss"></a>
    &nbsp;·&nbsp;
    <a href="https://github.com/ueen/antpod/releases" class="muted" id="footer-dl"></a>
  </footer>

  <script>
    // ── i18n ──────────────────────────────────────────────────────────────────
    const i18n = {
      en: {
        metaDesc:       'Open this podcast or episode in AntPod.',
        episode:        'Episode',
        loading:        'Loading…',
        failedToLoad:   'Failed to load',
        notInstalledMsg:'AntPod doesn’t seem to be installed. ',
        downloadLink:   'Download it here',
        notInstalledSfx:' — it’s free and open source.',
        openInAntpod:   'Open in AntPod',
        useDifferentApp:'Use a different app',
        openSource:     'Open source',
        download:       'Download',
      },
      de: {
        metaDesc:       'Diesen Podcast oder diese Episode in AntPod öffnen.',
        episode:        'Episode',
        loading:        'Lädt…',
        failedToLoad:   'Laden fehlgeschlagen',
        notInstalledMsg:'AntPod scheint nicht installiert zu sein. ',
        downloadLink:   'Hier herunterladen',
        notInstalledSfx:' — kostenlos und Open Source.',
        openInAntpod:   'In AntPod öffnen',
        useDifferentApp:'Andere App verwenden',
        openSource:     'Open Source',
        download:       'Herunterladen',
      },
      es: {
        metaDesc:       'Abre este podcast o episodio en AntPod.',
        episode:        'Episodio',
        loading:        'Cargando…',
        failedToLoad:   'Error al cargar',
        notInstalledMsg:'AntPod no parece estar instalado. ',
        downloadLink:   'Descárgalo aquí',
        notInstalledSfx:' — es gratuito y de código abierto.',
        openInAntpod:   'Abrir en AntPod',
        useDifferentApp:'Usar otra aplicación',
        openSource:     'Código abierto',
        download:       'Descargar',
      },
      fr: {
        metaDesc:       'Ouvrez ce podcast ou cet épisode dans AntPod.',
        episode:        'Épisode',
        loading:        'Chargement…',
        failedToLoad:   'Échec du chargement',
        notInstalledMsg:'AntPod ne semble pas être installé. ',
        downloadLink:   'Téléchargez-le ici',
        notInstalledSfx:' — c’est gratuit et open source.',
        openInAntpod:   'Ouvrir dans AntPod',
        useDifferentApp:'Utiliser une autre application',
        openSource:     'Open source',
        download:       'Télécharger',
      },
    };

    function detectLang() {
      const supported = ['de', 'es', 'fr'];
      for (const l of (navigator.languages || [navigator.language || 'en'])) {
        const code = l.split('-')[0].toLowerCase();
        if (supported.includes(code)) return code;
      }
      return 'en';
    }

    const lang = detectLang();
    const t = i18n[lang];
    document.documentElement.lang = lang;
    document.getElementById('meta-desc').content              = t.metaDesc;
    document.getElementById('badge-label').textContent        = t.episode;
    document.getElementById('ep-title').textContent           = t.loading;
    document.getElementById('not-installed-msg').textContent  = t.notInstalledMsg;
    document.getElementById('not-installed-link').textContent = t.downloadLink;
    document.getElementById('not-installed-suffix').textContent = t.notInstalledSfx;
    document.getElementById('btn-open-label').textContent     = t.openInAntpod;
    document.getElementById('btn-other-label').textContent    = t.useDifferentApp;
    document.getElementById('footer-oss').textContent         = t.openSource;
    document.getElementById('footer-dl').textContent          = t.download;

    // ── URL params ────────────────────────────────────────────────────────────
    // f = feed URL (https:// stripped), h = episode guid hash (11-char MD5),
    // t = title (episode title or podcast name), p = podcast name (episodes only)
    const params = new URLSearchParams(location.search);
    function restoreProto(s) {
      if (!s || s.startsWith('https://') || s.startsWith('http://')) return s;
      return s.startsWith('h0:') ? 'http://' + s.slice(3) : 'https://' + s;
    }
    const feed   = restoreProto(params.get('f') || '');
    const h      = params.get('h') || '';
    const pTitle = params.get('t') || '';
    const pPod   = params.get('p') || '';

    function render(rFeed, rTitle, rPodcast, rCover, rAudio) {
      const isEpisode = !!h;

      document.title = (rTitle || (isEpisode ? t.episode : 'Podcast')) +
        (rPodcast ? ' · ' + rPodcast : '') + ' — AntPod';

      if (rCover) _showCover(rCover);

      if (isEpisode) document.getElementById('badge').style.display = 'inline-flex';
      if (rPodcast)  document.getElementById('podcast-name').textContent = rPodcast;
      document.getElementById('ep-title').textContent = rTitle || (isEpisode ? t.episode : 'Podcast');

      if (rAudio) {
        const audioEl = document.getElementById('audio-el');
        audioEl.src = rAudio;
        showPlayer(audioEl);
      }

      if (rFeed) {
        function toBase64Url(str) {
          return btoa(unescape(encodeURIComponent(str)))
            .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }
        document.getElementById('btn-podlink').href =
          'https://pod.link/' + toBase64Url(rFeed);
        document.getElementById('feed-url-text').innerHTML =
          '<a href="' + encodeURI(rFeed) + '" target="_blank" rel="noopener">' +
          rFeed.replace(/^https?:\/\//, '') + '</a>';
        document.getElementById('feed-row').style.display = 'flex';
      }
    }

    // ── Audio player wiring ───────────────────────────────────────────────────
    function showPlayer(audioEl) {
      const playerEl = document.getElementById('player');
      playerEl.style.display = 'block';
      requestAnimationFrame(() => {
        playerEl.style.opacity = '1';
        playerEl.style.transform = 'translateY(0)';
      });
      wirePlayer(audioEl);
    }

    function wirePlayer(audioEl) {
      const iconPlay  = document.getElementById('icon-play');
      const iconPause = document.getElementById('icon-pause');
      const fill  = document.getElementById('cp-fill');
      const thumb = document.getElementById('cp-thumb');
      const track = document.getElementById('cp-track');
      const curEl = document.getElementById('cp-cur');
      const durEl = document.getElementById('cp-dur');

      function fmt(s) {
        if (!isFinite(s)) return '0:00';
        s = Math.floor(s);
        return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
      }
      function setProgress(pct) { fill.style.width = pct + '%'; thumb.style.left = pct + '%'; }

      audioEl.addEventListener('loadedmetadata', () => durEl.textContent = fmt(audioEl.duration));
      audioEl.addEventListener('timeupdate', () => {
        const pct = audioEl.duration ? (audioEl.currentTime / audioEl.duration) * 100 : 0;
        setProgress(pct); curEl.textContent = fmt(audioEl.currentTime);
      });
      audioEl.addEventListener('play',  () => { iconPlay.style.display='none';  iconPause.style.display='block'; });
      audioEl.addEventListener('pause', () => { iconPlay.style.display='block'; iconPause.style.display='none'; });
      audioEl.addEventListener('ended', () => { iconPlay.style.display='block'; iconPause.style.display='none'; setProgress(0); });

      let seeking = false;
      function seekFromEvent(e) {
        const rect = track.getBoundingClientRect();
        const x    = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const pct  = Math.max(0, Math.min(1, x / rect.width));
        if (audioEl.duration) audioEl.currentTime = pct * audioEl.duration;
        setProgress(pct * 100);
      }
      track.addEventListener('mousedown',  e => { seeking = true; seekFromEvent(e); });
      track.addEventListener('touchstart', e => { seeking = true; seekFromEvent(e); }, {passive:true});
      window.addEventListener('mousemove',  e => { if (seeking) seekFromEvent(e); });
      window.addEventListener('touchmove',  e => { if (seeking) seekFromEvent(e); }, {passive:true});
      window.addEventListener('mouseup',   () => seeking = false);
      window.addEventListener('touchend',  () => seeking = false);
    }

    // ── Cover image: RSS-first, iTunes fallback ───────────────────────────────
    function _showCover(src) {
      const el = document.getElementById('cover-img');
      el.onload = () => { el.style.opacity = '1'; };
      el.onerror = () => {};
      el.src = src; el.alt = '';
    }

    // SHA-1 first 8 bytes → base64url (same as Dart guidHash in share_utils.dart).
    async function guidHash(guid) {
      const data = new TextEncoder().encode(guid);
      const buf  = await crypto.subtle.digest('SHA-1', data);
      const b64  = btoa(String.fromCharCode(...new Uint8Array(buf, 0, 8)));
      return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    // PodcastIndex auth headers (same credentials as the app).
    async function piHeaders() {
      const key = 'WVABNRFZXMR56UKS7488';
      const secret = 'Yrb2fXKRtwFRkzcj4XNZBKmBhVbg8Uz5ZvMj5Prd';
      const ts = String(Math.floor(Date.now() / 1000));
      const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(key + secret + ts));
      const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
      return {'X-Auth-Key': key, 'X-Auth-Date': ts, 'Authorization': hex, 'User-Agent': 'AntPod/1.0'};
    }

    // PodcastIndex fallback: fetch cover + episode audio when RSS is CORS-blocked.
    async function tryPodcastIndex(feedUrl, searchTerm) {
      const base = 'https://api.podcastindex.org/api/1.0';
      try {
        // Cover art via feed lookup
        const feedData = await fetch(base + '/podcasts/byfeedurl?' +
          new URLSearchParams({url: feedUrl}), {headers: await piHeaders()}).then(r => r.json());
        const cover = feedData.feed?.artwork || feedData.feed?.image;
        if (cover) _showCover(cover);

        if (!h) return;

        // Fresh headers for episode call (new timestamp).
        const epData = await fetch(base + '/episodes/byfeedurl?' +
          new URLSearchParams({url: feedUrl, max: '1000'}), {headers: await piHeaders()}).then(r => r.json());
        console.log('[PI] episodes status:', epData.status, 'count:', epData.count, 'items:', epData.items?.length);
        for (const item of (epData.items || [])) {
          const guid = (item.guid || '').trim();
          if (!guid) continue;
          const itemHash = await guidHash(guid);
          console.log('[PI] guid:', guid, '→ hash:', itemHash, 'target:', h);
          if (itemHash !== h) continue;
          const audio = item.enclosureUrl || item.url || '';
          console.log('[PI] matched! audio:', audio);
          if (audio) {
            const audioEl = document.getElementById('audio-el');
            audioEl.src = audio;
            showPlayer(audioEl);
          }
          break;
        }
      } catch (e) { console.warn('[PI] error:', e); }
    }

    // Fetch RSS, extract cover art and (if episode) match audio by GUID hash.
    // Falls back to PodcastIndex when RSS is CORS-blocked.
    async function tryFetchRSS(feedUrl, searchTerm) {
      let xml;
      try {
        xml = await fetch(feedUrl).then(r => r.text());
      } catch (_) {
        tryPodcastIndex(feedUrl, searchTerm);
        return;
      }

      const doc = new DOMParser().parseFromString(xml, 'text/xml');

      const img =
        doc.querySelector('image[href]')?.getAttribute('href') ||
        doc.querySelector('image url')?.textContent?.trim();
      if (img) _showCover(img);

      if (!h) return;
      const items = doc.querySelectorAll('item');
      for (const item of items) {
        const guid = item.querySelector('guid')?.textContent?.trim() || '';
        if (!guid) continue;
        const itemHash = await guidHash(guid);
        if (itemHash !== h) continue;
        const audio = item.querySelector('enclosure')?.getAttribute('url') || '';
        if (audio) {
          const audioEl = document.getElementById('audio-el');
          audioEl.src = audio;
          showPlayer(audioEl);
        }
        break;
      }
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    window._openQuery = location.search;

    if (feed) {
      render(feed, pTitle, pPod, '', '');
      tryFetchRSS(feed, pPod || pTitle);
    } else {
      document.getElementById('ep-title').textContent = t.failedToLoad;
    }

    function togglePlay() {
      const audioEl = document.getElementById('audio-el');
      if (audioEl.paused) audioEl.play(); else audioEl.pause();
    }

    function openInApp() {
      window.location.href = 'antpod://open' + window._openQuery;
      setTimeout(() => {
        document.getElementById('not-installed').style.display = 'block';
      }, 2500);
    }
  </script>

</body>
